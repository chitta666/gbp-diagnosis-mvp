<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GBP 改善診断 (MVP)</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container">
    <h1 class="h1">GBP 改善診断 (MVP)</h1>

    <div class="row">
      <input id="urlInput" class="input" placeholder="URL または 店名+住所" />
      <button id="btn" class="btn btn--primary" type="button">診断する</button>
    </div>

    <div id="msg" class="muted"></div>

    <div id="card" class="card hidden">
      <div class="kpi">
        <div>
          <div class="kpi__label">スコア</div>
          <div id="score" class="kpi__value">-</div>
        </div>
        <div class="muted">/ 100</div>
      </div>

      <div class="section">
  <h2 class="section__title">口コミ比較</h2>
  <ul id="compareList" class="list"></ul>
</div>

<h2>写真比較</h2>
<ul id="photoCompare"></ul>

<h2>撮影すべき写真</h2>
<ul id="photoAdviceList"></ul>

<div class="section">
  <h2 class="section__title">ひとこと診断</h2>
  <div id="insight" class="muted"></div>
</div>

<div class="section">
  <h2 class="section__title">今週レポート</h2>
  <ul id="weeklyReportList" class="list"></ul>
</div>

      <div class="section">
        <h2 class="section__title">改善ToDo</h2>
        <ul id="todos" class="list"></ul>
      </div>

      <div class="section">
        <h2 class="section__title">減点内訳</h2>
        <ul id="breakdown" class="list"></ul>
        <div id="penalty" class="muted" style="margin-top:8px;"></div>
      </div>

      

      <div class="section">
        <h2 class="section__title">詳細</h2>
        <div id="summary"></div>
      </div>

      <div class="section">
        <h2 class="section__title">履歴</h2>
        <div class="row" style="justify-content:space-between;">
          <button id="clearHistory" type="button" class="btn">履歴を全削除</button>
          <div class="muted" style="font-size:12px;">※履歴クリックで再表示（APIは叩かない）</div>
        </div>
        <ul id="history" style="list-style:none; padding:0; margin:0;"></ul>
      </div>

      <details class="section">
        <summary style="cursor:pointer;">デバッグJSON（開く）</summary>
        <pre id="debug" class="pre"></pre>
      </details>
    </div>
  </div>
<script>
const btn = document.getElementById("btn");
const input = document.getElementById("urlInput");

const msg = document.getElementById("msg");
const card = document.getElementById("card");

const scoreEl = document.getElementById("score");
const todosEl = document.getElementById("todos");
const breakdownEl = document.getElementById("breakdown");
const penaltyEl = document.getElementById("penalty");
const summaryEl = document.getElementById("summary");
const debugEl = document.getElementById("debug");
const compareListEl = document.getElementById("compareList");

const historyEl = document.getElementById("history");
const clearHistoryBtn = document.getElementById("clearHistory");
const weeklyReportListEl = document.getElementById("weeklyReportList");

// ===== helpers =====
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;",
    "<": "&lt;",
    ">": "&gt;",
    '"': "&quot;",
    "'": "&#39;",
  }[c]));
}
function escapeAttr(s) {
  return escapeHtml(s);
}
function safeJsonParse(text, fallback = null) {
  try {
    return JSON.parse(text);
  } catch {
    return fallback;
  }
}

function resetUI() {
  msg.textContent = "";
  scoreEl.textContent = "-";
  todosEl.innerHTML = "";
  breakdownEl.innerHTML = "";
  penaltyEl.textContent = "";
  summaryEl.innerHTML = "";
  debugEl.textContent = "";
  if (compareListEl) compareListEl.innerHTML = "";
  if (weeklyReportListEl) weeklyReportListEl.innerHTML = "";
}

function hideCard() {
  card.classList.add("hidden");
}

function showCard() {
  card.classList.remove("hidden");
}

function setLoading(isLoading) {
  btn.disabled = isLoading;

  if (isLoading) {
    msg.textContent = "loading...";
    showCard();
    scoreEl.textContent = "-";
    todosEl.innerHTML = "<li>loading...</li>";
    breakdownEl.innerHTML = "<li>loading...</li>";
    penaltyEl.textContent = "";
    summaryEl.innerHTML = "<div>loading...</div>";
    debugEl.textContent = "";
    if (compareListEl) compareListEl.innerHTML = "<li>loading...</li>";
    if (weeklyReportListEl) weeklyReportListEl.innerHTML = "<li>loading...</li>";
  }
}

function showError(message) {
  msg.textContent = `ERROR: ${message}`;
  showCard();
  scoreEl.textContent = "0";
  todosEl.innerHTML = "<li>—</li>";
  breakdownEl.innerHTML = "<li>—</li>";
  penaltyEl.textContent = "";
  summaryEl.innerHTML = `<div class="error"><b>ERROR:</b> ${escapeHtml(message)}</div>`;
  debugEl.textContent = "";
  if (compareListEl) compareListEl.innerHTML = `<li>比較データなし: ${escapeHtml(message)}</li>`;
  if (weeklyReportListEl) {
  weeklyReportListEl.innerHTML = `<li>週次レポートなし: ${escapeHtml(message)}</li>`;
}
}

// ===== compare =====
async function fetchCompare(myPlaceId) {
  const res = await fetch(`/api/compare?my=${encodeURIComponent(myPlaceId)}`);
  const text = await res.text();

  const data = safeJsonParse(text, { ok: false, error: "INVALID_JSON", raw: text });
  if (!res.ok) return { ok: false, ...data };

  return data;
}

async function fetchWeeklyReport(myPlaceId) {
  const res = await fetch(`/api/weekly-report?my=${encodeURIComponent(myPlaceId)}`);
  const text = await res.text();

  let data;
  try {
    data = JSON.parse(text);
  } catch {
    return { ok: false, error: "INVALID_JSON", raw: text };
  }

  if (!res.ok) {
    return { ok: false, ...data };
  }

  return data;
}

function renderCompare(compare) {
  if (!compareListEl) return;

  compareListEl.innerHTML = "";

  if (!compare?.ok) {
    compareListEl.innerHTML = `<li>比較データなし: ${escapeHtml(compare?.error ?? "unknown error")}</li>`;
    return;
  }

  const rows = [
    `自店 総口コミ数: ${compare.my?.todayTotal ?? "-"}`,
    `競合 総口コミ数: ${compare.competitor?.todayTotal ?? "-"}`,
    `総差: ${compare.total_diff ?? "-"}`,
    `自店 前日差: ${compare.my?.delta ?? "-"}`,
    `競合 前日差: ${compare.competitor?.delta ?? "-"}`,
    `勢い差: ${compare.delta_diff ?? "-"}`,
  ];

  for (const row of rows) {
    const li = document.createElement("li");
    li.textContent = row;
    compareListEl.appendChild(li);
  }
}

function renderPhotoCompare(photo) {
  const el = document.getElementById("photoCompare");
  if (!el) return;

  el.innerHTML = "";

  if (!photo) {
    el.innerHTML = "<li>写真比較データなし</li>";
    return;
  }

  const rows = [
    `自店写真数: ${photo.myPhotos ?? "-"}`,
    `競合平均: ${photo.competitorPhotoAvg ?? "-"}`,
    `不足写真: ${photo.missingPhotos ?? "-"}`,
  ];

  for (const row of rows) {
    const li = document.createElement("li");
    li.textContent = row;
    el.appendChild(li);
  }
}

function renderPhotoAdvice(photoAdvice) {
  const el = document.getElementById("photoAdviceList");
  if (!el) return;

  el.innerHTML = "";

  if (!photoAdvice) {
    el.innerHTML = "<li>写真アドバイスなし</li>";
    return;
  }

  const shots = photoAdvice.recommendedShots ?? [];

  for (const s of shots) {
    const li = document.createElement("li");
    li.textContent = s;
    el.appendChild(li);
  }
}

// ===== result rendering =====
function renderTodos(todosArr, missingArr) {
  todosEl.innerHTML = "";

  const list =
    (Array.isArray(todosArr) && todosArr.length ? todosArr : null) ??
    (Array.isArray(missingArr) && missingArr.length ? missingArr : []);

  if (!list.length) {
    todosEl.innerHTML = "<li>特になし</li>";
    return;
  }

  for (const t of list) {
    const li = document.createElement("li");
    li.textContent = String(t);
    todosEl.appendChild(li);
  }
}

function renderBreakdown(diagnosis) {
  breakdownEl.innerHTML = "";
  const bd = Array.isArray(diagnosis?.breakdown) ? diagnosis.breakdown : [];

  const missingOnly = bd.filter((r) => r?.missing);
  if (!missingOnly.length) {
    breakdownEl.innerHTML = "<li>減点なし</li>";
    penaltyEl.textContent = "";
    return;
  }

  let sum = 0;
  for (const r of missingOnly) {
    const w = Number(r.weight) || 0;
    sum += w;

    const li = document.createElement("li");
    li.textContent = `× ${r.id}（-${w}）`;
    breakdownEl.appendChild(li);
  }

  const p = Number.isFinite(diagnosis?.penalty) ? diagnosis.penalty : sum;
  penaltyEl.textContent = `合計減点: -${p}`;
}

function renderSummary(details, placeId) {
  const name = details?.name ?? "-";
  const address = details?.formatted_address ?? "-";
  const phone = details?.international_phone_number ?? "なし";
  const website = details?.website ?? null;
  const photos = details?.photos?.length ?? 0;

  summaryEl.innerHTML = `
    <div><b>店名:</b> ${escapeHtml(name)}</div>
    <div><b>住所:</b> ${escapeHtml(address)}</div>
    <div><b>電話:</b> ${escapeHtml(phone)}</div>
    <div><b>Web:</b> ${
      website
        ? `<a href="${escapeAttr(website)}" target="_blank" rel="noopener">あり</a>`
        : "なし"
    }</div>
    <div><b>写真数:</b> ${photos}枚</div>
    <div class="muted"><b>placeId:</b> ${escapeHtml(placeId ?? "-")}</div>
  `;
}

function renderWeeklyReport(report) {
  if (!weeklyReportListEl) return;

  weeklyReportListEl.innerHTML = "";

  if (!report?.ok) {
    weeklyReportListEl.innerHTML = `<li>週次レポートなし: ${escapeHtml(report?.error ?? "unknown error")}</li>`;
    return;
  }

  const rows = [
    `自店 今週口コミ増加: ${report.my?.weeklyGain ?? "-"}`,
    `競合 今週口コミ増加: ${report.competitor?.weeklyGain ?? "-"}`,
    `今週増加差: ${report.weeklyGainDiff ?? "-"}`,
    `総口コミ差: ${report.totalDiff ?? "-"}`,
    `レポート期間: ${report.weekAgo ?? "-"} → ${report.today ?? "-"}`,
    `週次診断: ${report.insight ?? "-"}`,
  ];

  for (const row of rows) {
    const li = document.createElement("li");
    li.textContent = row;
    weeklyReportListEl.appendChild(li);
  }
}

async function showResult(data) {
  const diagnosis = data?.diagnosis ?? data;
  const details = data?.details ?? {};
  const placeId =
    data?.placeId ??
    data?.details?.placeId ??
    data?.details?.place_id ??
    null;

  scoreEl.textContent = String(Number.isFinite(diagnosis?.score) ? diagnosis.score : 0);
  renderTodos(diagnosis?.todos, diagnosis?.missing);
  renderBreakdown(diagnosis);
  renderSummary(details, placeId);
  debugEl.textContent = JSON.stringify(data, null, 2);
  renderPhotoCompare(data?.photoAnalysis);
  renderPhotoAdvice(data.photoAdvice);
  showCard();

  let compare;
  let weeklyReport;

  if (placeId) {
    compare = await fetchCompare(placeId);
    renderCompare(compare);

    weeklyReport = await fetchWeeklyReport(placeId);
    renderWeeklyReport(weeklyReport);
  } else {
    compare = { ok: false, error: "placeId missing" };
    renderCompare(compare);

    weeklyReport = { ok: false, error: "placeId missing" };
    renderWeeklyReport(weeklyReport);
  }

  const insightEl = document.getElementById("insight");
  if (insightEl) {
    insightEl.textContent = buildInsight(diagnosis, compare);
  }
}

function buildInsight(diagnosis, compare) {
  const todos = Array.isArray(diagnosis?.todos) ? diagnosis.todos : [];
  const totalDiff = compare?.total_diff;
  const deltaDiff = compare?.delta_diff;

  const reasons = [];

  if (Number.isFinite(totalDiff)) {
    if (totalDiff < 0) {
      reasons.push(`競合が総口コミ数で${Math.abs(totalDiff)}件多い`);
    } else if (totalDiff > 0) {
      reasons.push(`自店が総口コミ数で${totalDiff}件多い`);
    } else {
      reasons.push("総口コミ数は拮抗している");
    }
  }

  if (Number.isFinite(deltaDiff)) {
    if (deltaDiff < 0) {
      reasons.push(`直近の口コミ増加は競合が${Math.abs(deltaDiff)}件上回る`);
    } else if (deltaDiff > 0) {
      reasons.push(`直近の口コミ増加は自店が${deltaDiff}件上回る`);
    } else {
      reasons.push("直近の口コミ増加は同水準");
    }
  }

  if (todos.length) {
    reasons.push(`優先改善: ${todos.slice(0, 2).join(" / ")}`);
  }

  return reasons.length ? reasons.join("。") + "。" : "比較データがまだ不足しています。";
}

// ===== history =====
const HISTORY_KEY = "gbp_history_v1";
const HISTORY_MAX = 10;

function loadHistory() {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    const arr = JSON.parse(raw || "[]");
    return Array.isArray(arr) ? arr : [];
  } catch {
    return [];
  }
}

function saveHistory(arr) {
  localStorage.setItem(HISTORY_KEY, JSON.stringify(arr));
}

function nowStr() {
  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  return `${mm}/${dd} ${hh}:${mi}`;
}

function renderHistory(list) {
  if (!historyEl) return;

  historyEl.innerHTML = "";

  if (!list.length) {
    historyEl.innerHTML = `<li class="muted">履歴なし</li>`;
    return;
  }

  list.forEach((h, idx) => {
    const li = document.createElement("li");
    li.style.display = "flex";
    li.style.gap = "8px";
    li.style.alignItems = "center";
    li.style.margin = "6px 0";

    const showBtn = document.createElement("button");
    showBtn.type = "button";
    showBtn.className = "btn";
    showBtn.dataset.action = "show";
    showBtn.dataset.index = String(idx);
    showBtn.textContent = `${h.when} / ${h.score}点 / ${h.name ?? "-"} / ${h.q}`;
    showBtn.style.flex = "1";
    showBtn.style.textAlign = "left";

    const delBtn = document.createElement("button");
    delBtn.type = "button";
    delBtn.className = "btn";
    delBtn.dataset.action = "delete";
    delBtn.dataset.index = String(idx);
    delBtn.textContent = "削除";

    li.appendChild(showBtn);
    li.appendChild(delBtn);
    historyEl.appendChild(li);
  });
}

function addHistory(item) {
  const list = loadHistory();
  const filtered = list.filter((x) => x.q !== item.q);
  const next = [item, ...filtered].slice(0, HISTORY_MAX);
  saveHistory(next);
  renderHistory(next);
}

// ===== events =====
if (input) {
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") btn.click();
  });
}

if (historyEl) {
  historyEl.addEventListener("click", (e) => {
    const b = e.target.closest("button[data-index][data-action]");
    if (!b) return;

    const idx = Number(b.dataset.index);
    const action = b.dataset.action;
    const list = loadHistory();
    const item = list[idx];
    if (!item) return;

    if (action === "show") {
      input.value = item.q;
if (item.data) {
  showResult(item.data).catch((e) => showError(e?.message || String(e)));
}      return;
    }

    if (action === "delete") {
      const next = list.filter((_, i) => i !== idx);
      saveHistory(next);
      renderHistory(next);
    }
  });
}

if (clearHistoryBtn) {
  clearHistoryBtn.addEventListener("click", () => {
    if (!confirm("履歴を全削除して、表示もリセットします。よろしいですか？")) return;
    saveHistory([]);
    renderHistory([]);
    resetUI();
    hideCard();
  });
}

btn.addEventListener("click", async () => {
  resetUI();

  const q = input.value.trim();
  if (!q) {
    hideCard();
    msg.textContent = "URL / 店名+住所 を入力して";
    return;
  }

  setLoading(true);

  try {
    const res = await fetch(`/api/diagnose?q=${encodeURIComponent(q)}`);
    const text = await res.text();

    const data = safeJsonParse(text);
    if (!data) {
      throw new Error("APIがJSONを返していない: " + text.slice(0, 200));
    }

    if (!res.ok) {
      throw new Error(data?.error || `HTTP ${res.status}`);
    }

    const details = data?.details ?? {};
    const diagnosis = data?.diagnosis ?? data;
    const score = Number.isFinite(diagnosis?.score) ? diagnosis.score : 0;

    addHistory({
      q,
      when: nowStr(),
      score,
      name: details?.name ?? null,
      placeId:
        data?.placeId ??
        data?.details?.placeId ??
        data?.details?.place_id ??
        null,
      data,
    });

    await showResult(data);
    msg.textContent = "OK";
  } catch (e) {
    showError(e?.message || String(e));
  } finally {
    setLoading(false);
  }
});

// init
renderHistory(loadHistory());
</script>
